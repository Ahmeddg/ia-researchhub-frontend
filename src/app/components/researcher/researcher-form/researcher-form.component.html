<form (ngSubmit)="onSubmit()" #researcherForm="ngForm">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" name="fullName" [(ngModel)]="researcher.fullName"
                required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" [(ngModel)]="researcher.email" required>
        </div>
    </div>
    <div class="mb-3">
        <label for="affiliation" class="form-label">Affiliation</label>
        <input type="text" class="form-control" id="affiliation" name="affiliation" [(ngModel)]="researcher.affiliation"
            required>
    </div>
    <div class="mb-3">
        <label for="biography" class="form-label">Biography</label>
        <textarea class="form-control" id="biography" name="biography" rows="3"
            [(ngModel)]="researcher.biography"></textarea>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!researcherForm.form.valid">Save</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="researcherForm.reset()">Reset</button>
</form>
