<div class="hero-wrap hero-wrap-2"
    style="background-image: url(assets/images/researchers.png); background-size: cover; background-repeat: no-repeat; background-position: center;"
    data-stellar-background-ratio="0.5">
    <div class="overlay"></div>
    <div class="container-fluid">
        <div class="row no-gutters d-flex slider-text align-items-center justify-content-center">
            <div class="col-md-6 ftco-animated fadeInUp text-center">
                <p class="breadcrumbs"><span class="mr-2"><a href="index.html">Home</a></span> <span>Domains</span>
                </p>
                <h1 class="mb-3 bread">Our Domains</h1>
            </div>
        </div>
    </div>
</div>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Domains</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDomainModal">Add New</button>
    </div>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let domain of domains">
                <td>{{ domain.id }}</td>
                <td>{{ domain.name }}</td>
                <td>{{ domain.description }}</td>
            </tr>
            <tr *ngIf="domains.length === 0">
                <td colspan="3" class="text-center">No domains found</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Add Domain Modal -->
<div class="modal fade" id="addDomainModal" tabindex="-1" aria-labelledby="addDomainModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addDomainModalLabel">Add New Domain</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <app-domain-form (saveSuccess)="onSaveSuccess()"></app-domain-form>
            </div>
            <div class="modal-footer">
                <button type="button" id="closeAddDomainModal" class="btn btn-secondary"
                    data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
