<form (ngSubmit)="onSubmit()" #newsForm="ngForm">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title" name="title" [(ngModel)]="news.title" required>
    </div>
    <div class="mb-3">
        <label for="content" class="form-label">Content</label>
        <textarea class="form-control" id="content" name="content" rows="4" [(ngModel)]="news.content"
            required></textarea>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!newsForm.form.valid">Save</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="newsForm.reset()">Reset</button>
</form>
