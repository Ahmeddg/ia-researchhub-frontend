<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Projects</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProjectModal">Add New</button>
    </div>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Domain</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let project of projects">
                <td>{{ project.id }}</td>
                <td>{{ project.title }}</td>
                <td><span class="badge bg-secondary">{{ project.aiCategory }}</span></td>
                <td>{{ project.domain?.name || 'N/A' }}</td>
            </tr>
            <tr *ngIf="projects.length === 0">
                <td colspan="4" class="text-center">No projects found</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Add Project Modal -->
<div class="modal fade" id="addProjectModal" tabindex="-1" aria-labelledby="addProjectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addProjectModalLabel">Add New Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <app-project-form (saveSuccess)="onSaveSuccess()"></app-project-form>
            </div>
            <div class="modal-footer">
                <button type="button" id="closeAddProjectModal" class="btn btn-secondary"
                    data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
