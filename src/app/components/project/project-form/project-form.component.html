<form (ngSubmit)="onSubmit()" #projectForm="ngForm">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title" name="title" [(ngModel)]="project.title" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3" [(ngModel)]="project.description"
            required></textarea>
    </div>
    <div class="mb-3">
        <label for="aiCategory" class="form-label">AI Category</label>
        <input type="text" class="form-control" id="aiCategory" name="aiCategory" [(ngModel)]="project.aiCategory"
            required>
    </div>
    <button type="submit" class="btn btn-primary" [disabled]="!projectForm.form.valid">Save</button>
    <button type="button" class="btn btn-secondary ms-2" (click)="projectForm.reset()">Reset</button>
</form>
