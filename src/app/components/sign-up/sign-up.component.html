<div class="container-fluid">
    <div class="slider-text d-md-flex align-items-center">

        <!-- Left Side: Form -->
        <div class="one-half ftco-animated fadeInUp align-self-md-center p-md-5">
            <div class="signup-card shadow-lg p-4 bg-white rounded-3">
                <div class="signup-header text-center mb-4">
                    <div class="signup-icon mb-3">
                        <i class="fas fa-user-plus text-primary fs-1"></i>
                    </div>
                    <h2 class="fw-bold">Join Us</h2>
                    <p class="text-muted">Create your researcher account</p>
                </div>

                <form>
                    <div class="form-group mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input id="username" type="text" class="form-control form-control-lg"
                            placeholder="Enter username" required autofocus>
                    </div>

                    <div class="form-group mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <input id="email" type="email" class="form-control form-control-lg" placeholder="Enter email"
                            required>
                    </div>

                    <div class="form-group mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input id="password" type="password" class="form-control form-control-lg"
                            placeholder="Create password" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg signup-btn shadow-sm" type="submit">
                            Sign Up
                        </button>
                    </div>

                    <p class="text-center mt-4 mb-0 text-muted">
                        Already have an account? <a routerLink="/"
                            class="text-primary text-decoration-none fw-bold">Login</a>
                    </p>
                </form>
            </div>
        </div>

        <!-- Right Side: Decorative Image/Illustration -->
        <div class="one-half align-self-md-center text-center p-md-5 d-none d-md-block">
            <img src="assets/images/signup.svg" class="img-fluid ftco-animated fadeInRight" alt="Sign Up Illustration"
                style="max-height: 500px;">
        </div>

    </div>
</div>
