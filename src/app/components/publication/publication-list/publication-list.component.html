<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Publications</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPublicationModal">Add New</button>
    </div>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Date</th>
                <th>DOI</th>
                <th>Content</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let pub of publications">
                <td>{{ pub.id }}</td>
                <td>{{ pub.title }}</td>
                <td>{{ pub.publicationDate | date }}</td>
                <td>{{ pub.doi }}</td>
                <td>
                    <a *ngIf="pub.pdfUrl" [href]="pub.pdfUrl" target="_blank" class="btn btn-sm btn-outline-info">View
                        PDF</a>
                </td>
            </tr>
            <tr *ngIf="publications.length === 0">
                <td colspan="5" class="text-center">No publications found</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Add Publication Modal -->
<div class="modal fade" id="addPublicationModal" tabindex="-1" aria-labelledby="addPublicationModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addPublicationModalLabel">Add New Publication</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <app-publication-form (saveSuccess)="onSaveSuccess()"></app-publication-form>
            </div>
            <div class="modal-footer">
                <button type="button" id="closeAddPublicationModal" class="btn btn-secondary"
                    data-bs-dismiss="modal">Cancel</button>
            </div>
        </div>
    </div>
</div>
